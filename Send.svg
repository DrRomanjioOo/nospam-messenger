type MockMessageAPI struct {
	ListFn         func(ctx context.Context, beforeID int64, limit int) ([]domain.Message, error)
	SendFn         func(ctx context.Context, userID int64, login, content string) (domain.Message, error)
	GetFn          func(ctx context.Context, id int64) (domain.Message, error)
	DeleteByUserFn func(ctx context.Context, messageID, userID int64) (domain.Message, error)
}

func (m *MockMessageAPI) List(ctx context.Context, beforeID int64, limit int) ([]domain.Message, error) {
	return m.ListFn(ctx, beforeID, limit)
}
func (m *MockMessageAPI) Send(ctx context.Context, userID int64, login, content string) (domain.Message, error) {
	return m.SendFn(ctx, userID, login, content)
}
func (m *MockMessageAPI) Get(ctx context.Context, id int64) (domain.Message, error) {
	if m.GetFn != nil {
		return m.GetFn(ctx, id)
	}
	return domain.Message{}, nil
}
func (m *MockMessageAPI) DeleteByUser(ctx context.Context, messageID, userID int64) (domain.Message, error) {
	return m.DeleteByUserFn(ctx, messageID, userID)
}
