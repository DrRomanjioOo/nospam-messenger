	GetByIDFn   func(ctx context.Context, id int64) (domain.User, error)
}

func (m *MockUserStore) Create(ctx context.Context, login, passwordHash string) (domain.User, error) {
	return m.CreateFn(ctx, login, passwordHash)
}
func (m *MockUserStore) GetByLogin(ctx context.Context, login string) (domain.User, string, error) {
	return m.GetByLoginFn(ctx, login)
}
func (m *MockUserStore) GetByID(ctx context.Context, id int64) (domain.User, error) {
	return m.GetByIDFn(ctx, id)
}

